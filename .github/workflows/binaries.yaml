name: binaries
on:
  workflow_call:
    inputs:
      provenance:
        required: false
        type: boolean
      upload-assets:
        required: false
        type: boolean

permissions:
  contents: read

jobs:
  third-party-licenses:
    runs-on: ubuntu-24.04
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/setup
        with:
          skip-node: 'true'
      - run: go install github.com/google/go-licenses@v1.6.0
      - name: Download third-party license files
        run: |
          go-licenses save ./... --ignore $(go list -m) --save_path packaging/third-party
          chmod -R u+w packaging/third-party
      - id: upload
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: third-party-licenses
          path: packaging/third-party/

  binaries:
    needs: [third-party-licenses]
    strategy:
      matrix:
        os: [macos-15, ubuntu-24.04, windows-2025]
    outputs:
      id-macos-15: ${{ steps.output.outputs.id-macos-15 }}
      id-ubuntu-24.04: ${{ steps.output.outputs['id-ubuntu-24.04'] }}
      id-windows-2025: ${{ steps.output.outputs['id-windows-2025'] }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/setup

      # Install dependencies
      - name: Install cross-compilers
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get -y update
          sudo apt-get -y install g++-aarch64-linux-gnu g++-arm-linux-gnueabihf
      - run: npm ci --ignore-scripts
      # Retrieve third-party license files to include in binary packages
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          artifact-ids: ${{ needs.third-party-licenses.outputs.artifact-id }}
          path: packaging/third-party/

      # Native build, plus tests for good measure
      - name: Build for ${{ (runner.os == 'macOS' && 'arm64') || 'amd64' }}
        run: |
          npx -c 'node-pre-gyp rebuild'
          npx -c 'node-pre-gyp package'
          mkdir binaries
          mv build/stage/*/* binaries
      - run: npm run test
      # Cross builds
      - name: Cross build for amd64
        if: runner.os == 'macOS'
        run: |
          npx -c 'node-pre-gyp rebuild --target_arch=x64'
          npx -c 'node-pre-gyp package --target_arch=x64'
          mv build/stage/*/* binaries
        env:
          CGO_ENABLED: '1'
          GOARCH: amd64
      - name: Cross build for arm
        if: runner.os == 'Linux'
        run: |
          npx -c 'node-pre-gyp rebuild --target_arch=arm'
          npx -c 'node-pre-gyp package --target_arch=arm'
          mv build/stage/*/* binaries
        env:
          CC: arm-linux-gnueabihf-gcc
          CXX: arm-linux-gnueabihf-g++
          CGO_ENABLED: '1'
          GOARCH: arm
      - name: Cross build for arm64
        if: runner.os == 'Linux'
        run: |
          npx -c 'node-pre-gyp rebuild --target_arch=arm64'
          npx -c 'node-pre-gyp package --target_arch=arm64'
          mv build/stage/*/* binaries
        env:
          CC: aarch64-linux-gnu-gcc
          CXX: aarch64-linux-gnu-g++
          CGO_ENABLED: '1'
          GOARCH: arm64

      - id: upload
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: binaries-${{ matrix.os }}
          path: binaries/
      - id: output
        run: echo "id-${{ matrix.os }}=${{ steps.upload.outputs.artifact-id }}" >> "$GITHUB_OUTPUT"
        shell: bash

  attest-upload-binaries:
    if: inputs.provenance || inputs.upload-assets
    needs: [binaries]
    runs-on: ubuntu-24.04
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - id: artifacts
        run: echo "ids=$(jq -nr '[env.INPUTS|fromjson|.[]]|join(",")')" >> "$GITHUB_OUTPUT"
        env:
          INPUTS: ${{ toJSON(needs.binaries.outputs) }}
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          artifact-ids: ${{ steps.artifacts.outputs.ids }}
          merge-multiple: true
          path: binaries
      - id: attest
        if: inputs.provenance
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: ./binaries/*.tar.gz
      - run: gh release upload '${{ github.ref_name }}' ./binaries/*.tar.gz
        if: inputs.upload-assets
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
      - run: |
          jq -c . '${{ steps.attest.outputs.bundle-path }}' > binaries.intoto.jsonl
          gh release upload '${{ github.ref_name }}' binaries.intoto.jsonl
        if: inputs.provenance && inputs.upload-assets
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
